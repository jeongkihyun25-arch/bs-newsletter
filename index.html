<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Newsletter for LT Ambassadors</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f8f9fa; }
        .header { background-color: #d71921; color: white; padding: 60px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: -0.5px; line-height: 1.3; font-weight: 800; }
        .header p { margin-top: 15px; opacity: 0.9; font-size: 15px; font-weight: 400; }
        .container { max-width: 500px; margin: -30px auto 50px; padding: 0 20px; }
        .archive-card { background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 35px 25px; }
        .section-title { font-weight: bold; font-size: 18px; margin-bottom: 25px; color: #222; display: flex; align-items: center; }
        .section-title::before { content: ''; display: inline-block; width: 4px; height: 18px; background: #d71921; margin-right: 10px; border-radius: 2px; }
        
        /* 알림 메시지 스타일 (목록이 빌 때) */
        .empty-status { text-align: center; padding: 40px 0; color: #999; font-size: 14px; border: 1px dashed #eee; border-radius: 15px; }
        
        /* 뉴스레터 목록 스타일 (추가 시 사용) */
        .issue-link { display: none; justify-content: space-between; align-items: center; padding: 20px; background: #fff; border: 1px solid #eee; border-radius: 15px; text-decoration: none; color: #333; margin-bottom: 15px; transition: all 0.2s ease; }
        .issue-link:active { background: #f8f9fa; transform: scale(0.97); border-color: #d71921; }
        .issue-info { display: flex; flex-direction: column; }
        .issue-date { font-size: 13px; color: #d71921; font-weight: bold; margin-bottom: 5px; }
        .issue-title { font-weight: bold; font-size: 16px; color: #333; }
        .arrow { color: #ccc; font-size: 18px; }
        
        .footer { text-align: center; font-size: 12px; color: #aaa; margin-top: 40px; padding-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Monthly Newsletter<br>for LT Ambassadors</h1>
        <p>브리지스톤 LT 앰배서더 뉴스레터</p>
    </div>

    <div class="container">
        <div class="archive-card">
            <div class="section-title">발행 목록</div>
            
            <div class="empty-status">
                첫 번째 뉴스레터 발행을 준비 중입니다.
            </div>

            )을 제거하고 사용하세요 -->
            </div>
        <div class="footer">© 2026 Bridgestone Tire Sales Korea. PS Team</div>
    </div>
</body>
</html>
