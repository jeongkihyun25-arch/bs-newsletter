<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="월간 LT 엠베서더 뉴스레터 저장소">
    <meta property="og:description" content="브리지스톤 타이어 공식 월간 뉴스레터 전체 목록입니다.">
    <meta property="og:image" content="https://www.bridgestone.co.kr/content/dam/bridgestone/consumer/bst/kr/common/logo/bridgestone-logo.png">
    <meta property="og:url" content="https://bridgestone-korea-newsletter.netlify.app/">

    <title>월간 LT 엠베서더 뉴스레터 저장소</title>
    <style>
        :root { --bs-red: #D71921; }
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: white; }
        
        /* 상단 바: 로고 포함 */
        .top-nav { background-color: var(--bs-red); color: white; padding: 12px 5%; display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 35px; background: white; padding: 5px; border-radius: 4px; } /* 로고가 흰 바탕일 경우 대비 */
        .nav-text h2 { margin: 0; font-size: 15px; font-weight: 800; }
        .nav-text p { margin: 0; font-size: 11px; opacity: 0.9; }

        .main-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .sub-title { color: var(--bs-red); font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .main-title { font-size: 26px; font-weight: 800; margin: 0 0 15px 0; letter-spacing: -1px; word-break: keep-all; }
        .description { color: #666; font-size: 14px; margin-bottom: 30px; word-break: keep-all; }
        .info-box { border-left: 4px solid var(--bs-red); background-color: #fff; border: 1px solid #eee; padding: 18px; border-radius: 4px; margin-bottom: 40px; font-size: 13px; color: #555; }
        .year-section { border-bottom: 2px solid var(--bs-red); display: flex; align-items: center; gap: 8px; margin-bottom: 25px; padding-bottom: 5px; }
        .year-text { font-size: 18px; font-weight: 800; color: var(--bs-red); }
        .empty-grid { text-align: center; padding: 50px 0; background: #f9f9f9; border-radius: 12px; border: 1px dashed #ddd; color: #999; font-size: 14px; }
        .footer { text-align: center; font-size: 11px; color: #aaa; margin: 50px 0 30px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <img src="https://www.bridgestone.co.kr/content/dam/bridgestone/consumer/bst/kr/common/logo/bridgestone-logo.png" alt="Bridgestone Logo" class="logo-img">
        <div class="nav-text">
            <h2>브리지스톤 타이어 세일즈 코리아</h2>
            <p>뉴스레터</p>
        </div>
    </div>

    <div class="main-container">
        <p class="sub-title">뉴스레터 아카이브</p>
        <h1 class="main-title">월간 LT 엠베서더 뉴스레터 저장소</h1>
        <p class="description">브리지스톤 타이어 공식 월간 LT 엠베서더 뉴스레터 전체 목록입니다. 각 호를 클릭하여 내용을 확인하세요.</p>

        <div class="info-box">
            매월 새 호가 발행되면 아래 목록에 자동으로 추가됩니다. 딜러 담당자에게 최신 소식을 전달해 드립니다.
        </div>

        <div class="year-section">
            <span class="year-text">2026</span> <span class="year-unit">년</span>
        </div>

        <div class="empty-grid">
            첫 번째 뉴스레터 발행을 준비 중입니다.
        </div>
    </div>

    <div class="footer">© 2026 Bridgestone Tire Sales Korea. PS Team</div>

</body>
</html>
