<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="📢 브리지스톤 LT 엠베서더 뉴스레터 아카이브">
    <meta property="og:description" content="브리지스톤 타이어 공식 월간 뉴스레터 저장소입니다.">
    <meta property="og:image" content="https://jeongkihyun25-arch.github.io/bs-newsletter/logo.png">

    <title>월간 LT 엠베서더 뉴스레터 아카이브</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'bs-red': '#D71921', 'bs-dark': '#1a1a1a' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: #FAFAFA; overflow-x: hidden; }
        
        .text-gradient { background: linear-gradient(to right, #D71921, #FF4B4B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 매거진 카드 호버 효과 */
        .magazine-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .magazine-card:hover { transform: translateY(-5px); box-shadow: 0 25px 50px -12px rgba(215, 25, 33, 0.15); border-color: rgba(215, 25, 33, 0.3); }
        
        /* 사진 호버 시 살짝 확대 */
        .magazine-card img { transition: transform 0.7s ease; }
        .magazine-card:hover img { transform: scale(1.08); }
    </style>
</head>
<body class="text-slate-900">

    <nav class="bg-white/80 backdrop-blur-xl sticky top-0 z-50 border-b border-slate-200/60 shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="https://jeongkihyun25-arch.github.io/bs-newsletter/logo.png" alt="Bridgestone" class="h-6">
                <div class="hidden sm:block">
                    <h2 class="text-[13px] font-black text-slate-800 tracking-tighter leading-none">브리지스톤 타이어 세일즈 코리아</h2>
                    <p class="text-[9px] font-bold text-slate-400 mt-1.5 uppercase tracking-[0.2em]">Archive Hub</p>
                </div>
            </div>
            <a href="https://www.bridgestone-korea.co.kr/ko" target="_blank" class="flex items-center gap-2 text-xs font-black text-slate-600 hover:text-bs-red bg-white hover:bg-red-50 px-5 py-2.5 rounded-full transition-all border border-slate-200 shadow-sm">
                <i data-lucide="globe" class="w-4 h-4"></i> 공식 홈페이지
            </a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-16">
        <header class="mb-16 text-center md:text-left" data-aos="fade-up">
            <h1 class="text-4xl sm:text-5xl lg:text-6xl font-black tracking-tighter text-slate-900 mb-6 leading-[1.1]">
                LT 엠베서더<br><span class="text-gradient">매거진 아카이브</span>
            </h1>
            <p class="text-lg text-slate-500 max-w-2xl leading-relaxed font-medium mx-auto md:mx-0">
                함께 보는 브리지스톤의 기술 리포트.<br>업데이트되는 최신 소식을 확인하세요.
            </p>
        </header>

        <section>
            <div id="newsletter-list" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="flex flex-col sm:flex-row bg-white border border-slate-100 rounded-[2rem] h-64 animate-pulse shadow-sm">
                    <div class="sm:w-2/5 h-48 sm:h-full bg-slate-200"></div>
                    <div class="sm:w-3/5 p-8 flex flex-col justify-center">
                        <div class="h-6 bg-slate-200 rounded-md w-3/4 mb-4"></div>
                        <div class="h-4 bg-slate-100 rounded-md w-full mb-2"></div>
                        <div class="h-4 bg-slate-100 rounded-md w-2/3"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-white border-t border-slate-200 py-16 px-6 text-center mt-10">
        <p class="text-[10px] font-black text-slate-300 tracking-[0.5em] uppercase mb-4 italic">Solutions for your journey</p>
        <p class="text-xs text-slate-400 font-medium">© 2026 Bridgestone Tire Sales Korea. PS Team</p>
    </footer>

    <script>
        const USERNAME = 'jeongkihyun25-arch';
        const REPO = 'bs-newsletter';
        
        // 배경용 기본 자동차/도로 이미지
        const DEFAULT_IMAGE = 'https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?auto=format&fit=crop&q=80&w=800';

        async function loadNewsletters() {
            const listElement = document.getElementById('newsletter-list');
            try {
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/`);
                if (!response.ok) throw new Error('Network response was not ok');
                const files = await response.json();

                const newsletters = files
                    .filter(file => file.name.startsWith('20') && file.name.endsWith('.html') && file.name !== 'index.html')
                    .sort((a, b) => b.name.localeCompare(a.name));

                listElement.innerHTML = '';

                if (newsletters.length === 0) {
                    listElement.innerHTML = '<div class="col-span-full py-20 text-center text-slate-400 font-bold">발행된 뉴스레터가 없습니다.</div>';
                    return;
                }

                newsletters.forEach((file, index) => {
                    const isNew = index === 0;
                    const nameParts = file.name.replace('.html', '').split('-');
                    
                    const year = nameParts[0];
                    const month = nameParts[1];
                    const displayName = `${year}년 ${month}월호`;
                    
                    const cardHtml = `
                        <a href="${file.name}" class="magazine-card group flex flex-col sm:flex-row bg-white border border-slate-200 rounded-[2rem] overflow-hidden shadow-sm relative" data-aos="fade-up" data-aos-delay="${index * 50}">
                            
                            <div class="sm:w-2/5 relative h-56 sm:h-auto overflow-hidden bg-slate-900 shrink-0">
                                <img src="${DEFAULT_IMAGE}" alt="Cover" class="w-full h-full object-cover opacity-80 group-hover:scale-110 transition-transform duration-700">
                                
                                <div class="absolute inset-0 flex flex-col items-center justify-center text-white bg-black/40 backdrop-blur-[2px] group-hover:bg-black/10 group-hover:backdrop-blur-0 transition-all duration-500">
                                    <span class="text-xs font-bold text-white/90 mb-1.5 tracking-widest border-b border-white/30 pb-1">${year}년</span>
                                    <div class="flex items-baseline drop-shadow-xl text-white">
                                        <span class="text-5xl font-black">${month}</span>
                                        <span class="text-xl font-bold ml-1">월호</span>
                                    </div>
                                </div>
                                
                                ${isNew ? '<div class="absolute top-4 left-4 bg-bs-red text-white text-[10px] font-black px-2.5 py-1 rounded-full shadow-md">최신호</div>' : ''}
                            </div>
                            
                            <div class="sm:w-3/5 p-6 sm:p-8 flex flex-col justify-center relative">
                                <div class="mb-4">
                                    <span class="text-[10px] font-black text-red-500 bg-red-50 px-2.5 py-1 rounded tracking-widest mb-3 inline-block">월간 리포트</span>
                                    <h4 class="text-2xl font-black text-slate-800 tracking-tighter group-hover:text-bs-red transition-colors">${displayName}</h4>
                                </div>
                                <p class="text-[13px] text-slate-500 font-medium leading-relaxed line-clamp-2 mb-6">
                                    브리지스톤 LT 엠베서더를 위한 이달의 기술 리포트 및 세일즈 인사이트를 확인하세요.
                                </p>
                                
                                <div class="mt-auto flex items-center justify-between border-t border-slate-100 pt-4">
                                    <span class="text-xs font-black text-slate-500 tracking-widest group-hover:text-bs-red transition-colors">뉴스레터 보기</span>
                                    <div class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 group-hover:bg-bs-red group-hover:text-white transition-colors">
                                        <i data-lucide="arrow-right" class="w-4 h-4"></i>
                                    </div>
                                </div>
                            </div>
                        </a>
                    `;
                    listElement.insertAdjacentHTML('beforeend', cardHtml);
                });
                
                lucide.createIcons();
                AOS.refresh();
            } catch (error) {
                listElement.innerHTML = '<div class="col-span-full py-10 text-center text-red-400">데이터를 불러오는 중 문제가 발생했습니다.</div>';
            }
        }

        AOS.init({ duration: 800, once: true });
        loadNewsletters();
    </script>
</body>
</html>
