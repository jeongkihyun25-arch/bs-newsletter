<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="📢 브리지스톤 LT 엠베서더 뉴스레터 아카이브">
    <meta property="og:description" content="브리지스톤 타이어 공식 월간 뉴스레터 저장소입니다.">
    <meta property="og:image" content="https://jeongkihyun25-arch.github.io/bs-newsletter/logo.png">
    <meta property="og:url" content="https://jeongkihyun25-arch.github.io/bs-newsletter/">

    <title>월간 LT 엠베서더 뉴스레터 아카이브</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'bs-red': '#D71921', 'bs-dark': '#1a1a1a' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background-color: #f9fafb; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-slate-900">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="https://jeongkihyun25-arch.github.io/bs-newsletter/logo.png" alt="Bridgestone" class="h-7 p-1 bg-white rounded shadow-sm">
                <div class="hidden sm:block">
                    <h2 class="text-xs font-black text-slate-800 tracking-tighter leading-none">브리지스톤 타이어 세일즈 코리아</h2>
                    <p class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Archive Hub</p>
                </div>
            </div>
            <a href="https://www.bridgestone-korea.co.kr/ko" target="_blank" class="flex items-center gap-2 text-xs font-black text-bs-red hover:bg-red-50 px-4 py-2 rounded-full transition-colors border border-red-100">
                <i data-lucide="globe" class="w-4 h-4"></i> 공식 홈페이지 바로가기
            </a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-16">
        <header class="mb-16" data-aos="fade-up">
            <h1 class="text-4xl sm:text-5xl font-black tracking-tighter text-slate-900 mb-6 leading-tight">
                월간 LT 엠베서더<br><span class="text-bs-red underline decoration-red-100 decoration-8 underline-offset-4">뉴스레터 저장소</span>
            </h1>
            <p class="text-lg text-slate-500 max-w-xl leading-relaxed font-medium">
                브리지스톤 타이어의 기술력과 현장의 소식을 담은 월간 뉴스레터 아카이브입니다. 엠베서더 여러분의 영업을 지원합니다.
            </p>
        </header>

        <section>
            <div class="flex items-center gap-3 mb-10" data-aos="fade-right">
                <div class="bg-bs-red p-2 rounded-lg text-white shadow-lg shadow-red-100"><i data-lucide="layout-grid" class="w-5 h-5"></i></div>
                <h3 class="text-2xl font-black text-slate-900 tracking-tighter">발행 리스트</h3>
                <div class="h-[1px] flex-1 bg-slate-200"></div>
            </div>

            <div id="newsletter-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 text-center py-20 text-slate-400">
                <i data-lucide="loader-2" class="w-8 h-8 mx-auto animate-spin mb-2"></i>
                <p>목록을 불러오고 있습니다...</p>
            </div>
        </section>
    </main>

    <footer class="bg-slate-50 border-t border-slate-100 py-16 px-6 text-center">
        <p class="text-[10px] font-black text-slate-300 tracking-[0.4em] uppercase mb-4 italic">Solutions for your journey</p>
        <p class="text-[11px] text-slate-400 font-medium">© 2026 Bridgestone Tire Sales Korea. PS Team</p>
    </footer>

    <script>
        const USERNAME = 'jeongkihyun25-arch';
        const REPO = 'bs-newsletter';

        async function loadNewsletters() {
            const listElement = document.getElementById('newsletter-list');
            try {
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/`);
                const files = await response.json();

                const newsletters = files
                    .filter(file => file.name.startsWith('20') && file.name.endsWith('.html') && file.name !== 'index.html')
                    .sort((a, b) => b.name.localeCompare(a.name));

                if (newsletters.length === 0) {
                    listElement.innerHTML = '<div class="col-span-full py-10 font-bold italic">발행된 내역이 없습니다.</div>';
                    return;
                }

                listElement.innerHTML = '';
                newsletters.forEach((file, index) => {
                    const isNew = index === 0;
                    const nameParts = file.name.replace('.html', '').split('-');
                    const displayName = nameParts.length >= 2 ? `${nameParts[0]}년 ${nameParts[1]}월호` : file.name.replace('.html', '');
                    
                    const cardHtml = `
                        <a href="${file.name}" class="card-hover group bg-white border border-slate-200 p-8 rounded-[2rem] flex flex-col justify-between h-56 relative" data-aos="fade-up" data-aos-delay="${index * 50}">
                            ${isNew ? '<div class="absolute right-6 top-6"><span class="bg-bs-red text-white text-[9px] font-black px-2 py-0.5 rounded-full ring-4 ring-red-50">NEW</span></div>' : ''}
                            <div class="bg-slate-50 w-12 h-12 rounded-2xl flex items-center justify-center text-slate-400 group-hover:bg-bs-red group-hover:text-white transition-all duration-300">
                                <i data-lucide="file-text" class="w-6 h-6"></i>
                            </div>
                            <div class="text-left">
                                <h4 class="text-xl font-black text-slate-800 tracking-tighter mb-1">${displayName}</h4>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Bridgestone Newsletter</p>
                            </div>
                        </a>
                    `;
                    listElement.insertAdjacentHTML('beforeend', cardHtml);
                });
                
                lucide.createIcons();
                AOS.refresh();
            } catch (error) {
                listElement.innerHTML = '<div class="col-span-full text-red-400">데이터를 불러올 수 없습니다.</div>';
            }
        }

        AOS.init({ duration: 800, once: true });
        loadNewsletters();
        lucide.createIcons();
    </script>
</body>
</html>
