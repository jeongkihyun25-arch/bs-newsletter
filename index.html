<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="📢 브리지스톤 LT 엠베서더 뉴스레터 아카이브">
    <meta property="og:description" content="브리지스톤 타이어 공식 월간 뉴스레터 저장소입니다.">
    <meta property="og:image" content="https://jeongkihyun25-arch.github.io/bs-newsletter/logo.png">
    <meta property="og:url" content="https://jeongkihyun25-arch.github.io/bs-newsletter/">

    <title>월간 LT 엠베서더 뉴스레터 아카이브</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'bs-red': '#D71921', 'bs-dark': '#1a1a1a' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', sans-serif; background-color: #f9fafb; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden">

    <nav class="glass-header sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="https://jeongkihyun25-arch.github.io/bs-newsletter/logo.png" alt="Bridgestone" class="h-8 p-1 bg-white rounded shadow-sm">
                <div>
                    <h2 class="text-sm font-black text-slate-800 tracking-tighter leading-none">브리지스톤 타이어 세일즈 코리아</h2>
                    <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Newsletter Archive</p>
                </div>
            </div>
            <a href="https://www.bridgestone-korea.co.kr/ko" target="_blank" class="hidden sm:flex items-center gap-2 text-xs font-black text-bs-red hover:bg-red-50 px-4 py-2 rounded-full transition-colors">
                <i data-lucide="globe" class="w-4 h-4"></i> 공식 홈페이지
            </a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12">
        <header class="mb-16 text-center sm:text-left" data-aos="fade-up">
            <span class="inline-block px-3 py-1 bg-red-100 text-bs-red text-[10px] font-black rounded-full mb-4 uppercase tracking-widest">Resources Hub</span>
            <h1 class="text-4xl sm:text-5xl font-black tracking-tighter text-slate-900 mb-6 leading-tight">월간 LT 엠베서더<br><span class="text-bs-red underline decoration-red-100 decoration-8 underline-offset-4">뉴스레터 저장소</span></h1>
            <p class="text-lg text-slate-500 max-w-2xl leading-relaxed font-medium">브리지스톤 타이어 공식 월간 LT 엠베서더 뉴스레터의 모든 기록을 한눈에 확인하세요.</p>
            
            <div class="mt-8 sm:hidden">
                <a href="https://www.bridgestone-korea.co.kr/ko" target="_blank" class="inline-flex items-center gap-2 bg-white border border-slate-200 px-6 py-3 rounded-2xl text-sm font-bold text-slate-700 shadow-sm">
                    <i data-lucide="globe" class="w-4 h-4 text-bs-red"></i> 공식 홈페이지 방문
                </a>
            </div>
        </header>

        <section>
            <div class="flex items-center gap-4 mb-10" data-aos="fade-right">
                <div class="bg-bs-red p-2 rounded-lg text-white"><i data-lucide="calendar-days" class="w-5 h-5"></i></div>
                <h3 class="text-2xl font-black text-slate-900 tracking-tighter">2026년 발행 목록</h3>
                <div class="h-[1px] flex-1 bg-slate-200"></div>
            </div>

            <div id="newsletter-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full py-20 text-center">
                    <div class="animate-spin inline-block mb-4 text-bs-red"><i data-lucide="loader-2" class="w-8 h-8"></i></div>
                    <p class="text-slate-400 font-medium tracking-tight">발행 목록을 실시간으로 불러오고 있습니다...</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-slate-50 border-t border-slate-100 py-16 px-6 text-center mt-20">
        <p class="text-xs font-black text-slate-300 tracking-[0.4em] uppercase mb-4 italic">Solutions for your journey</p>
        <p class="text-xs text-slate-400 font-medium">© 2026 Bridgestone Tire Sales Korea. PS Team All Rights Reserved.</p>
    </footer>

    <script>
        // 깃허브 정보
        const USERNAME = 'jeongkihyun25-arch';
        const REPO = 'bs-newsletter';

        async function loadNewsletters() {
            const listElement = document.getElementById('newsletter-list');
            try {
                // 1. 깃허브 API로 파일 목록 가져오기
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/`);
                const files = await response.json();

                // 2. 뉴스레터 파일 필터링
                const newsletters = files
                    .filter(file => file.name.startsWith('20') && file.name.endsWith('.html') && file.name !== 'index.html')
                    .sort((a, b) => b.name.localeCompare(a.name));

                if (newsletters.length === 0) {
                    listElement.innerHTML = '<div class="col-span-full py-20 text-center text-slate-400 font-bold italic">발행된 뉴스레터가 아직 없습니다.</div>';
                    return;
                }

                // 3. 카드 HTML 생성
                listElement.innerHTML = '';
                newsletters.forEach((file, index) => {
                    const isNew = index === 0;
                    // 파일명 예쁘게 (2026-05.html -> 2026년 05월호)
                    const nameParts = file.name.replace('.html', '').split('-');
                    const displayName = nameParts.length >= 2 ? `${nameParts[0]}년 ${nameParts[1]}월호` : file.name.replace('.html', '');
                    
                    const cardHtml = `
                        <a href="${file.name}" class="card-hover group bg-white border border-slate-200 p-7 rounded-[2rem] flex flex-col justify-between h-52 relative overflow-hidden" data-aos="fade-up" data-aos-delay="${index * 50}">
                            ${isNew ? '<div class="absolute -right-8 -top-8 w-20 h-20 bg-bs-red/10 rounded-full flex items-center justify-center pt-6 pr-6"><span class="text-[10px] font-black text-bs-red">NEW</span></div>' : ''}
                            <div class="bg-slate-50 w-12 h-12 rounded-2xl flex items-center justify-center text-slate-400 group-hover:bg-bs-red group-hover:text-white transition-colors duration-300">
                                <i data-lucide="file-text" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <h4 class="text-xl font-black text-slate-800 tracking-tighter mb-1">${displayName}</h4>
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Monthly Edition</p>
                            </div>
                            <div class="flex items-center gap-1.5 text-[10px] font-black text-bs-red opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                READ MORE <i data-lucide="arrow-right" class="w-3 h-3"></i>
                            </div>
                        </a>
                    `;
                    listElement.insertAdjacentHTML('beforeend', cardHtml);
                });
                
                // 아이콘 및 애니메이션 리로드
                lucide.createIcons();
                AOS.refresh();

            } catch (error) {
                listElement.innerHTML = '<div class="col-span-full py-20 text-center text-red-400 font-bold">목록을 불러오는 중 오류가 발생했습니다.</div>';
            }
        }

        // 초기화
        AOS.init({ duration: 800, once: true });
        loadNewsletters();
        lucide.createIcons();
    </script>
</body>
</html>
